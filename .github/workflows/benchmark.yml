name: Malware Benchmark Pipeline

on:
  workflow_dispatch: 

jobs:
  run-dynamic-analysis:
    runs-on: macos-latest # CRITICAL FIX: macOS has hardware acceleration enabled natively
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: brew install yara || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Benchmark in Cloud Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 5X
          script: python benchmark_runner.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Evaluation Artifacts
        uses: actions/upload-artifact@v4
        if: always() # CRITICAL: Upload the logs even if the script crashes
        with:
          name: benchmark-results
          path: evaluation/
